version: '3'
services:
  web:
    image: anytask
    container_name: anytask
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=anytask.settings_docker
      - "VIRTUAL_HOST=$DOMAIN"
      - "LETSENCRYPT_HOST=$DOMAIN"
      - HSTS=max-age=31536000; includeSubDomains; preload
    restart: always
    volumes:
      - ../../anytask-data:/app/data
      - ../../anytask-media:/app/anytask/media

networks:
  default:
    external:
        name: $NETWORK
